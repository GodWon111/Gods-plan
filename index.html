<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        header {
            background: #35424a;
            color: #ffffff;
            padding: 20px 0;
            text-align: center;
        }
        .container {
            width: 80%;
            margin: auto;
            overflow: hidden;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        th, td {
            border: 1px solid #dddddd;
            text-align: left;
            padding: 8px;
        }
        th {
            background-color: #35424a;
            color: white;
        }
    </style>
</head>
<body>
    <header>
        <h1>Trading Dashboard</h1>
    </header>
    <div class="container">
        <h2>Asset Trading Overview</h2>
        <table>
            <thead>
                <tr>
                    <th>Asset</th>
                    <th>Price</th>
                    <th>Change</th>
                    <th>Volume</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Bitcoin (BTC)</td>
                    <td>$50,000</td>
                    <td>+5%</td>
                    <td>2,000 BTC</td>
                </tr>
                <tr>
                    <td>Ethereum (ETH)</td>
                    <td>$4,000</td>
                    <td>-2%</td>
                    <td>1,500 ETH</td>
                </tr>
                <tr>
                    <td>Litecoin (LTC)</td>
                    <td>$200</td>
                    <td>+1.5%</td>
                    <td>10,000 LTC</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
