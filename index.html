<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Divine Real Signals</title>
<style>
/* ---------- Global ---------- */
body, html { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#000; color:#fff; font-family:sans-serif;}
* { box-sizing:border-box; }
canvas#starfield { position:absolute; top:0; left:0; width:100%; height:100%; z-index:0; }

/* ---------- Loading Page ---------- */
#loadingPage { position:absolute; top:0; left:0; width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#000; z-index:1000; }
#loadingPage h1 { color:gold; font-size:2.5rem; text-shadow:0 0 15px gold; margin-bottom:1rem; }
#loadingBar { width:80%; height:12px; background:#222; border-radius:6px; overflow:hidden; }
#loadingProgress { width:0%; height:100%; background:linear-gradient(90deg,gold,white); }

/* ---------- Password ---------- */
#passwordOverlay { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); display:none; flex-direction:column; align-items:center; justify-content:center; z-index:2000; }
#passContainer { display:flex; gap:15px; }
.passBox { width:60px; height:60px; border:2px solid #555; border-radius:10px; display:flex; justify-content:center; align-items:center; font-size:2rem; color:#ffd700; box-shadow:0 0 10px rgba(255,215,0,0.5); transition:all 0.3s; }
.passBox.filled { box-shadow:0 0 25px #00ffff, 0 0 50px #00ffff; color:#00ffff; }

/* ---------- Dashboard ---------- */
#dashboard { display:none; width:100%; height:100%; overflow-y:auto; position:relative; padding:10px; z-index:1; }
.header { display:flex; justify-content:space-between; align-items:center; padding:10px; font-size:1.3rem; font-weight:bold; color:gold; text-shadow:0 0 10px gold; }
.tabs { display:flex; gap:15px; margin:10px 0; }
.tab { padding:10px 15px; background:#111; border-radius:10px; cursor:pointer; transition:all 0.3s; }
.tab.active { background:gold; color:#000; }
#controls { display:flex; flex-wrap:wrap; gap:15px; justify-content:space-between; margin:10px 0; }
#controls label { font-size:1rem; }
.signalCard { position:relative; background:rgba(255,255,255,0.05); border-radius:15px; padding:12px; margin:10px 0; }
.signalCard.top { border:2px solid gold; box-shadow:0 0 15px gold; }
.signalCoin { font-size:1.4rem; font-weight:bold; }
.signalDetails { margin-top:8px; font-size:0.9rem; line-height:1.4; }
.winrate { font-weight:bold; color:#00ff80; }
.lightning { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; background:radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%); animation:flash 0.3s linear 0s; display:none; }
@keyframes flash { 0%{opacity:0} 50%{opacity:1} 100%{opacity:0} }

/* ---------- Search / Analyzer ---------- */
#searchTab { display:none; }
#searchContainer { display:flex; flex-direction:column; gap:15px; margin:10px 0; }
#searchContainer input { padding:10px; border-radius:10px; border:none; font-size:1rem; }
#cryptoList { max-height:200px; overflow-y:auto; background:#111; border-radius:10px; }
.cryptoItem { padding:10px; cursor:pointer; border-bottom:1px solid #222; }
.cryptoItem:hover { background:gold; color:#000; }

/* ---------- Coin Analysis ---------- */
#coinPage { display:none; flex-direction:column; gap:15px; margin-top:10px; }
#coinPage input { padding:8px; border-radius:10px; border:none; font-size:1rem; width:100%; }
#coinPage button { padding:10px; border-radius:10px; border:none; background:gold; color:#000; font-weight:bold; cursor:pointer; }
</style>
</head>
<body>

<canvas id="starfield"></canvas>

<div id="loadingPage">
  <h1>GOD'S PLAN</h1>
  <div id="loadingBar"><div id="loadingProgress"></div></div>
</div>

<div id="passwordOverlay">
  <h2 style="color:gold; margin-bottom:20px;">Enter Divine Code</h2>
  <div id="passContainer">
    <div class="passBox"></div>
    <div class="passBox"></div>
    <div class="passBox"></div>
    <div class="passBox"></div>
  </div>
  <input type="password" id="hiddenPass" style="opacity:0; position:absolute;">
</div>

<div id="dashboard">
  <div class="header"><span>DIVINE REAL SIGNALS</span><span id="balanceDisplay">$10,000</span></div>
  <div class="tabs">
    <div class="tab active" id="signalsTabBtn">Signals</div>
    <div class="tab" id="searchTabBtn">Manual Analyzer</div>
  </div>

  <div id="signalsTab">
    <div id="controls">
      <label>Leverage: <span id="levVal">3x</span></label>
      <input type="range" id="levSlider" min="1" max="15" value="3">
      <label>Trade Size ($):</label>
      <select id="tradeSize">
        <option value="5">$5</option>
        <option value="10" selected>$10</option>
        <option value="15">$15</option>
        <option value="20">$20</option>
        <option value="50">$50</option>
      </select>
      <button onclick="generateSignals()">Refresh Signals</button>
    </div>
    <div id="signalsContainer"></div>
  </div>

  <div id="searchTab">
    <div id="searchContainer">
      <input type="text" id="cryptoSearch" placeholder="Search crypto...">
      <div id="cryptoList"></div>
      <div id="coinPage">
        <input type="number" id="entryPrice" placeholder="Enter Entry Price">
        <input type="number" id="coinLeverage" placeholder="Leverage">
        <input type="number" id="coinSize" placeholder="Trade Size ($)">
        <button onclick="analyzeManualTrade()">Analyze Trade</button>
        <div id="manualResults"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ---------- Starfield ----------
const canvas=document.getElementById('starfield');
const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth; canvas.height=window.innerHeight;
let stars=[];
for(let i=0;i<300;i++){stars.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, z:Math.random()*canvas.width});}
function starAnim(){
  ctx.fillStyle="black"; ctx.fillRect(0,0,canvas.width,canvas.height);
  stars.forEach(s=>{
    s.z-=4; if(s.z<=0){ s.z=canvas.width; s.x=Math.random()*canvas.width; s.y=Math.random()*canvas.height; }
    let k=128/s.z;
    let px=(s.x-canvas.width/2)*k+canvas.width/2;
    let py=(s.y-canvas.height/2)*k+canvas.height/2;
    if(px>=0&&py>=0&&px<=canvas.width&&py<=canvas.height){ let size=(1-k/2)*2; ctx.fillStyle="white"; ctx.fillRect(px,py,size,size);}
  });
  requestAnimationFrame(starAnim);
}
starAnim();

// ---------- Loading ----------
let progress=0;
let loadInt=setInterval(()=>{
  progress+=Math.random()*15;
  document.getElementById('loadingProgress').style.width=Math.min(progress,100)+'%';
  if(progress>=100){ clearInterval(loadInt); showPass(); }
},200);

// ---------- Password ----------
const hiddenPass=document.getElementById('hiddenPass');
const passBoxes=document.querySelectorAll('.passBox');
let inputPass='';
function showPass(){ document.getElementById('loadingPage').style.display='none'; document.getElementById('passwordOverlay').style.display='flex'; hiddenPass.focus();}
hiddenPass.addEventListener('input', ()=>{
  inputPass=hiddenPass.value;
  passBoxes.forEach((b,i)=>{b.classList.toggle('filled',!!inputPass[i]);});
  if(inputPass.length>=4){
    if(inputPass==='4444'){
      document.getElementById('passwordOverlay').style.display='none';
      document.getElementById('dashboard').style.display='block';
      generateSignals(); fetchCryptoList();
    } else { alert('Wrong Code'); inputPass=''; hiddenPass.value=''; passBoxes.forEach(b=>b.classList.remove('filled')); }
  }
});
passBoxes[0].addEventListener('click', ()=>hiddenPass.focus());

// ---------- Tabs ----------
const signalsTabBtn=document.getElementById('signalsTabBtn');
const searchTabBtn=document.getElementById('searchTabBtn');
const signalsTabDiv=document.getElementById('signalsTab');
const searchTabDiv=document.getElementById('searchTab');
signalsTabBtn.addEventListener('click', ()=>{signalsTabBtn.classList.add('active'); searchTabBtn.classList.remove('active'); signalsTabDiv.style.display='block'; searchTabDiv.style.display='none';});
searchTabBtn.addEventListener('click', ()=>{searchTabBtn.classList.add('active'); signalsTabBtn.classList.remove('active'); searchTabDiv.style.display='block'; signalsTabDiv.style.display='none';});

// ---------- Indicators ----------
function EMA(prices, period){ const k=2/(period+1); let ema=prices[0]; for(let i=1;i<prices.length;i++) ema=prices[i]*k + ema*(1-k); return ema; }
function RSI(prices, period=14){ let gains=0, losses=0; for(let i=1;i<=period;i++){ const diff=prices[i]-prices[i-1]; diff>0?gains+=diff:losses-=diff;} const rs=gains/(losses||1); return 100-(100/(1+rs)); }
function MACD(prices){ const ema12=EMA(prices,12); const ema26=EMA(prices,26); return ema12-ema26; }
function Bollinger(prices){ const sma=prices.reduce((a,b)=>a+b,0)/prices.length; const std=Math.sqrt(prices.map(p=>(p-sma)**2).reduce((a,b)=>a+b)/prices.length); return {upper:sma+2*std, lower:sma-2*std}; }

// ---------- Fetch Binance Data ----------
async function getCandles(symbol, interval='1m', limit=100){ const url=`https://fapi.binance.com/fapi/v1/klines?symbol=${symbol}&interval=${interval}&limit=${limit}`; return await fetch(url).then(r=>r.json()); }

let leverage=3, tradeSize=10;
document.getElementById('levSlider').addEventListener('input',e=>{ leverage=e.target.value; document.getElementById('levVal').innerText=leverage+'x'; generateSignals(); });
document.getElementById('tradeSize').addEventListener('change',e=>{ tradeSize=+e.target.value; generateSignals(); });

// ---------- Generate Signals ----------
async function generateSignals(){
  const container=document.getElementById('signalsContainer');
  container.innerHTML='<div style="text-align:center; margin-top:20px;">Fetching signals...</div>';

  const symbolsResp = await fetch('https://fapi.binance.com/fapi/v1/exchangeInfo').then(r=>r.json());
  const symbols = symbolsResp.symbols.filter(s=>s.contractType==="PERPETUAL"&&s.status==="TRADING").map(s=>s.symbol);

  container.innerHTML='';
  let signalList=[];

  for(const sym of symbols){
    try{
      const klines1=await getCandles(sym,'1m',100);
      const closes1=klines1.map(c=>+c[4]);
      if(closes1.length<15) continue;

      const emaFast1=EMA(closes1,9), emaSlow1=EMA(closes1,21);
      const rsi1=RSI(closes1);
      const macd1=MACD(closes1);
      const bb1=Bollinger(closes1);

      let direction=null;
      if(rsi1<30 && emaFast1>emaSlow1 && macd1>0) direction='LONG';
      if(rsi1>70 && emaFast1<emaSlow1 && macd1<0) direction='SHORT';
      if(!direction) continue;

      const price=closes1[closes1.length-1];
      const vol=Math.abs(emaFast1-emaSlow1)/price;
      const rrFactor=2+vol*5;
      let sl,tp;
      if(direction==='LONG'){ sl=price*(1-vol*0.5); tp=price*(1+vol*rrFactor); }
      else { sl=price*(1+vol*0.5); tp=price*(1-vol*rrFactor); }
      const liq=direction==='LONG'?price*(1-1/leverage):price*(1+1/leverage);

      const winrateEst=Math.min(99, Math.max(65, Math.floor(60+vol*500)));

      signalList.push({sym,direction,price,tp,sl,liq,winrateEst});
    } catch{}
  }

  signalList.sort((a,b)=>b.winrateEst-a.winrateEst);

  signalList.forEach((s,i)=>{
    const card=document.createElement('div');
    card.className='signalCard'+(i<3?' top':'');
    card.innerHTML=`
      <div class="signalCoin">${s.sym} • ${s.direction}</div>
      <div class="signalDetails">
        Entry: $${s.price.toFixed(2)}<br>
        TP:     $${s.tp.toFixed(2)}<br>
        SL:     $${s.sl.toFixed(2)}<br>
        Liq:    $${s.liq.toFixed(2)}<br>
        Leverage: ${leverage}x<br>
        Size: $${tradeSize}<br>
        <span class="winrate">Winrate: ${s.winrateEst}%</span>
      </div>
      <div class="lightning"></div>
    `;
    container.appendChild(card);
    if(i<3){ const l=card.querySelector('.lightning'); l.style.display='block'; setTimeout(()=>l.style.display='none',300);}
  });
}

setInterval(generateSignals,60000);

// ---------- Manual Analyzer ----------
let allSymbols=[];
async function fetchCryptoList(){
  const symbolsResp = await fetch('https://fapi.binance.com/fapi/v1/exchangeInfo').then(r=>r.json());
  allSymbols = symbolsResp.symbols.filter(s=>s.contractType==="PERPETUAL"&&s.status==="TRADING").map(s=>s.symbol);
  displayCryptoList('');
}
function displayCryptoList(filter){
  const listDiv=document.getElementById('cryptoList');
  listDiv.innerHTML='';
  allSymbols.filter(s=>s.toLowerCase().includes(filter.toLowerCase())).forEach(sym=>{
    const item=document.createElement('div'); item.className='cryptoItem'; item.innerText=sym;
    item.addEventListener('click',()=>{ openCoinPage(sym); });
    listDiv.appendChild(item);
  });
}
document.getElementById('cryptoSearch').addEventListener('input',e=>displayCryptoList(e.target.value));

function openCoinPage(symbol){
  document.getElementById('coinPage').style.display='flex';
  document.getElementById('coinPage').dataset.symbol=symbol;
  document.getElementById('manualResults').innerHTML='';
}

async function analyzeManualTrade(){
  const symbol=document.getElementById('coinPage').dataset.symbol;
  const entry=+document.getElementById('entryPrice').value;
  const lev=+document.getElementById('coinLeverage').value;
  const size=+document.getElementById('coinSize').value;
  if(!symbol || !entry || !lev || !size){ alert('Enter all fields'); return; }

  const klines=await getCandles(symbol,'1m',100);
  const closes=klines.map(c=>+c[4]);
  const emaFast=EMA(closes,9), emaSlow=EMA(closes,21);
  const rsiVal=RSI(closes);
  const macdVal=MACD(closes);
  const vol=Math.abs(emaFast-emaSlow)/entry;
  const rrFactor=2+vol*5;
  let direction=null;
  if(rsiVal<30 && emaFast>emaSlow && macdVal>0) direction='LONG';
  if(rsiVal>70 && emaFast<emaSlow && macdVal<0) direction='SHORT';
  if(!direction) direction='UNKNOWN';
  let sl,tp;
  if(direction==='LONG'){ sl=entry*(1-vol*0.5); tp=entry*(1+vol*rrFactor); }
  else if(direction==='SHORT'){ sl=entry*(1+vol*0.5); tp=entry*(1-vol*rrFactor); }
  else { sl=entry; tp=entry; }
  const liq=direction==='LONG'?entry*(1-1/lev):entry*(1+1/lev);
const winrate=Math.min(99, Math.max(60, Math.floor(60 + vol*500)));

document.getElementById('manualResults').innerHTML=`
  <div class="signalCard top">
    <div class="signalCoin">${symbol} • ${direction}</div>
    <div class="signalDetails">
      Entry: $${entry.toFixed(2)}<br>
      TP: $${tp.toFixed(2)}<br>
      SL: $${sl.toFixed(2)}<br>
      Liq: $${liq.toFixed(2)}<br>
      Leverage: ${lev}x<br>
      Size: $${size}<br>
      <span class="winrate">Estimated Winrate: ${winrate}%</span>
    </div>
    <div class="lightning" style="display:block;"></div>
  </div>
`;
}

// ---------- Adjust viewport ----------
window.addEventListener('resize',()=>{ canvas.width=window.innerWidth; canvas.height=window.innerHeight; });

// ---------- Continuous update of signals ----------
async function continuousUpdate(){
  try{ await generateSignals(); } catch(e){}
  setTimeout(continuousUpdate,30000);
}
continuousUpdate();

</script>
</body>
</html>
