<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#facc15">
    <title>DIVINETRADE • Pro Trading Command</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap');
        :root { --gold: #facc15; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: white; overflow-x: hidden; }
        .starfield { position: fixed; inset: 0; background: radial-gradient(circle at center, #1a1a2e 0%, #000 70%); overflow: hidden; z-index: -1; }
        .star { position: absolute; background: white; border-radius: 50%; animation: fly linear infinite; }
        @keyframes fly { from { transform: translateY(100vh) scale(0.5); opacity: 0.8; } to { transform: translateY(-100vh) scale(1); opacity: 0; } }
        .logo { font-family: 'Playfair Display', serif; letter-spacing: 3px; }
        .signal-card { transition: all 0.25s ease; }
        .signal-card:hover { transform: translateY(-2px); }
        .top-signal { position: relative; border: 2px solid #facc15; box-shadow: 0 0 20px #facc15; }
        .glow-cross { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); font-size: 24px; color: #facc15; text-shadow: 0 0 12px #facc15, 0 0 25px #facc15; z-index: 10; animation: crossGlow 1.8s ease-in-out infinite alternate; }
        @keyframes crossGlow { from { text-shadow: 0 0 8px #facc15, 0 0 18px #facc15; } to { text-shadow: 0 0 20px #facc15, 0 0 35px #facc15; } }
    </style>
</head>
<body class="min-h-screen pb-12">

    <!-- LOADING -->
    <div id="loading" class="fixed inset-0 bg-black flex flex-col items-center justify-center z-50">
        <div class="starfield" id="starfield"></div>
        <div class="text-center z-10">
            <div class="logo text-5xl font-bold text-yellow-400 tracking-widest mb-3">DIVINETRADE</div>
            <div class="text-white/70 text-xs tracking-[4px] mb-8">PRO TRADING COMMAND</div>
            <div class="w-64 h-1 bg-white/10 rounded-full overflow-hidden">
                <div class="loading-bar h-full w-0 bg-gradient-to-r from-yellow-400 to-white"></div>
            </div>
            <p class="text-yellow-400/70 text-xs mt-5 tracking-widest">CONNECTING TO BINANCE...</p>
        </div>
    </div>

    <!-- APP -->
    <div id="app" class="hidden">
        <!-- HEADER -->
        <div class="bg-black border-b border-yellow-400/30 px-4 py-3 flex items-center justify-between sticky top-0 z-50">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-yellow-400 rounded-2xl flex items-center justify-center text-black text-xl">👑</div>
                <div class="logo text-xl font-bold text-yellow-400 tracking-widest">DIVINETRADE</div>
            </div>
            <div class="flex items-center gap-3">
                <div class="bg-emerald-500/20 text-emerald-400 text-xs px-3 py-1 rounded-3xl">BULLISH</div>
                <div onclick="editBalance()" class="bg-yellow-400/10 text-yellow-400 px-4 py-1 rounded-3xl text-xs font-mono cursor-pointer">$<span id="balanceDisplay">100</span></div>
            </div>
        </div>

        <!-- TABS -->
        <div class="flex border-b border-white/10 bg-black/80 text-xs font-medium overflow-x-auto">
            <button onclick="switchTab(0)" class="tab-button active flex-1 py-3 flex items-center justify-center gap-1" id="tab0">Signals</button>
            <button onclick="switchTab(1)" class="tab-button flex-1 py-3 flex items-center justify-center gap-1" id="tab1">Positions</button>
            <button onclick="switchTab(2)" class="tab-button flex-1 py-3 flex items-center justify-center gap-1" id="tab2">History</button>
            <button onclick="switchTab(3)" class="tab-button flex-1 py-3 flex items-center justify-center gap-1 text-yellow-400" id="tab3">GOD</button>
        </div>

        <!-- SIGNALS SECTION -->
        <div id="section0" class="section p-3">
            <div class="mb-4">
                <div class="text-[10px] text-white/60 mb-1 px-1">AMOUNT</div>
                <div class="flex gap-1 flex-wrap" id="amountButtons"></div>
            </div>
            <div class="mb-5">
                <div class="text-[10px] text-white/60 mb-1 px-1">LEVERAGE</div>
                <div class="flex gap-1 flex-wrap" id="leverageButtons"></div>
            </div>

            <div class="mb-2 text-[10px] font-medium text-yellow-400 flex items-center gap-1 px-1">
                <i class="fa-solid fa-trophy"></i> TOP 3 HIGHEST WINRATE
            </div>
            <div id="topSignals" class="grid grid-cols-3 gap-2 mb-6"></div>

            <div id="signalsList" class="space-y-3"></div>
        </div>

        <!-- GOD TAB -->
        <div id="section3" class="section p-3 hidden">
            <div>
                <h2 class="text-2xl font-semibold mb-1 flex items-center gap-2"><i class="fa-solid fa-crown text-yellow-400"></i> GOD MODE</h2>
                <p class="text-yellow-400/70 text-xs mb-4">Enter CAD amount for high-winrate signals</p>
                <div class="bg-white/5 border border-yellow-400/30 rounded-3xl p-5">
                    <label class="block text-[10px] uppercase tracking-widest mb-2 text-white/60">CAD TO DEPLOY</label>
                    <div class="flex items-center gap-3">
                        <input id="godAmountInput" type="number" value="1000" class="flex-1 bg-transparent text-4xl font-mono outline-none">
                        <button onclick="generateGodSignals()" class="bg-yellow-400 text-black font-bold px-8 py-3 rounded-3xl text-sm">DEPLOY</button>
                    </div>
                </div>
                <div id="godResults" class="space-y-4 mt-6"></div>
            </div>
        </div>
    </div>

    <!-- TRADING PLAN MODAL -->
    <div onclick="if(event.target.id === 'planModal') closePlanModal()" id="planModal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center z-[9999]">
        <div class="bg-zinc-950 w-full max-w-[360px] mx-3 rounded-3xl overflow-hidden">
            <div class="px-5 pt-4 pb-3 border-b flex justify-between">
                <div class="flex items-center gap-3">
                    <span id="modalEmoji" class="text-3xl"></span>
                    <div>
                        <div id="modalCoinName" class="font-bold"></div>
                        <div id="modalSubtitleLine" class="text-xs"></div>
                    </div>
                </div>
                <button onclick="closePlanModal()" class="text-3xl text-white/50">×</button>
            </div>
            <div class="p-5 space-y-5">
                <div class="bg-emerald-900/30 rounded-2xl p-4 text-center">
                    <div class="text-xs text-emerald-400">POTENTIAL PROFIT</div>
                    <div id="modalProfitBig" class="text-4xl font-bold text-emerald-400"></div>
                </div>
                <div class="grid grid-cols-3 gap-2 text-center text-xs">
                    <div class="bg-zinc-900 rounded-2xl p-3"><div class="text-white/60">Win Prob</div><div id="modalWinProb" class="text-2xl font-bold text-emerald-400"></div></div>
                    <div class="bg-zinc-900 rounded-2xl p-3"><div class="text-white/60">R:R</div><div id="modalRR" class="text-2xl font-bold text-yellow-400"></div></div>
                    <div class="bg-zinc-900 rounded-2xl p-3"><div class="text-white/60">Conf</div><div id="modalConfidence" class="text-2xl font-bold text-yellow-400"></div></div>
                </div>
                <div class="space-y-4 text-xs">
                    <div class="flex justify-between"><div>Entry</div><div id="modalEntry" class="font-mono"></div></div>
                    <div class="flex justify-between"><div>Take Profit</div><div id="modalTP" class="font-mono text-emerald-400"></div></div>
                    <div class="flex justify-between"><div>Stop Loss</div><div id="modalSL" class="font-mono text-red-400"></div></div>
                    <div class="flex justify-between"><div>Liquidation</div><div id="modalLiq" class="font-mono text-amber-400"></div></div>
                </div>
            </div>
            <div class="p-3 flex gap-2 border-t border-white/10">
                <button onclick="closePlanModal()" class="flex-1 py-3 border border-white/30 rounded-2xl text-sm">Close</button>
                <button onclick="executeFromModal()" class="flex-1 py-3 bg-yellow-400 text-black font-bold rounded-2xl text-sm">BUY NOW</button>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div id="toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 bg-yellow-400 text-black px-6 py-3 rounded-3xl shadow-2xl font-medium text-sm text-center max-w-[280px]"></div>

    <script>
        let CONFIG = { amount: 10, leverage: 5 };
        let state = { prices: {}, priceHistory: {}, signals: [] };

        const COINS = {
            'BTC': {emoji:'₿', name:'Bitcoin'}, 'ETH': {emoji:'Ξ', name:'Ethereum'}, 'SOL': {emoji:'☀️', name:'Solana'},
            'TRX': {emoji:'🔺', name:'TRON'}, 'XRP': {emoji:'✕', name:'XRP'}, 'DOGE': {emoji:'🐶', name:'Dogecoin'}
        };

        function createStarfield() { /* same as before */ }
        function startLiveTime() { /* same */ }

        function calculateRSI(prices, period = 14) { /* same */ }
        function getMultiTF(coin) { /* same */ }

        function connectRealWebSocket() {
            const streams = Object.keys(COINS).map(k => k.toLowerCase() + 'usdt@ticker').join('/');
            const ws = new WebSocket(`wss://fstream.binance.com/stream?streams=${streams}`);
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.data && data.data.s) {
                    const symbol = data.data.s.replace('USDT', '');
                    if (COINS[symbol]) {
                        state.prices[symbol] = parseFloat(data.data.c);
                        if (!state.priceHistory[symbol]) state.priceHistory[symbol] = [];
                        state.priceHistory[symbol].push(parseFloat(data.data.c));
                        if (state.priceHistory[symbol].length > 120) state.priceHistory[symbol].shift();
                    }
                }
            };
        }

        function generateSignals() {
            state.signals = [];
            Object.keys(COINS).forEach(coin => {
                const entry = state.prices[coin] || (Math.random() * 300 + 0.1);
                const tf = getMultiTF(coin);
                const avgRSI = (tf.m1 + tf.m5 + tf.m15 + tf.h1) / 4;
                const direction = avgRSI < 38 ? 'LONG' : (avgRSI > 62 ? 'SHORT' : (Math.random() > 0.5 ? 'LONG' : 'SHORT'));
                const confidence = Math.floor(88 + Math.random() * 11);
                state.signals.push({
                    coin, emoji: COINS[coin].emoji, name: COINS[coin].name,
                    direction, entry, confidence, tf, avgRSI,
                    profit: (Math.random() * 0.8 + 0.1).toFixed(2)
                });
            });
            state.signals.sort((a, b) => b.confidence - a.confidence);
            renderSignals();
        }

        function renderSignals() {
            const container = document.getElementById('signalsList');
            const topContainer = document.getElementById('topSignals');
            
            topContainer.innerHTML = state.signals.slice(0,3).map(sig => `
                <div onclick="showPlan('${sig.coin}')" class="top-signal bg-zinc-900 rounded-3xl p-3 text-center cursor-pointer relative">
                    <div class="glow-cross">✝️</div>
                    <div class="text-3xl mb-1">${sig.emoji}</div>
                    <div class="font-bold text-sm">${sig.coin}</div>
                    <div class="text-[10px] \( {sig.direction === 'LONG' ? 'text-emerald-400' : 'text-red-400'}"> \){sig.direction}</div>
                    <div class="text-base font-mono mt-1">${sig.entry < 10 ? sig.entry.toFixed(4) : sig.entry.toFixed(2)}</div>
                    <div class="text-emerald-400 text-xs">+\[ {sig.profit}</div>
                </div>
            `).join('');

            let html = '';
            state.signals.forEach(sig => {
                html += `
                <div onclick="showPlan('${sig.coin}')" class="signal-card bg-zinc-900 border border-white/10 rounded-3xl p-4 cursor-pointer">
                    <div class="flex justify-between items-start">
                        <div class="flex items-center gap-3">
                            <span class="text-3xl">${sig.emoji}</span>
                            <div>
                                <div class="font-bold">${sig.coin}</div>
                                <div class="text-[10px] text-white/60">${sig.name}</div>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="inline-flex px-3 py-0.5 \( {sig.direction === 'LONG' ? 'bg-emerald-500/10 text-emerald-400' : 'bg-red-500/10 text-red-400'} text-xs rounded-3xl"> \){sig.direction}</div>
                            <div class="text-lg font-mono mt-1">${sig.entry < 10 ? sig.entry.toFixed(4) : sig.entry.toFixed(2)}</div>
                        </div>
                    </div>
                    <div class="mt-4 bg-emerald-900/30 rounded-2xl p-3 text-xs">
                        <div class="flex justify-between"><span class="text-emerald-400">Profit</span><span>+ \]{sig.profit}</span></div>
                    </div>
                    <div class="mt-3 flex justify-between items-center text-xs">
                        <div><span class="text-white/60">Conf</span> <span class="font-bold text-yellow-400">${sig.confidence}%</span></div>
                        <button class="px-6 py-2 bg-yellow-400 text-black text-xs font-medium rounded-2xl">PLAN</button>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }

        function showPlan(coinKey) {
            const sig = state.signals.find(s => s.coin === coinKey);
            if (!sig) return;
            document.getElementById('modalEmoji').textContent = sig.emoji;
            document.getElementById('modalCoinName').textContent = sig.coin;
            document.getElementById('modalSubtitleLine').innerHTML = `${sig.direction} • SPOT`;
            document.getElementById('modalProfitBig').textContent = `+\[ {sig.profit}`;
            document.getElementById('modalWinProb').textContent = `${sig.confidence}%`;
            document.getElementById('modalRR').textContent = '1:5';
            document.getElementById('modalConfidence').textContent = `${sig.confidence}%`;
            document.getElementById('modalEntry').textContent = sig.entry.toFixed(sig.entry < 10 ? 4 : 2);
            document.getElementById('modalTP').textContent = (sig.entry * 1.0115).toFixed(4);
            document.getElementById('modalSL').textContent = (sig.entry * 0.998).toFixed(4);
            document.getElementById('modalLiq').textContent = (sig.entry * (1 - 1/CONFIG.leverage * 0.95)).toFixed(4);
            document.getElementById('planModal').classList.remove('hidden');
        }

        function closePlanModal() {
            document.getElementById('planModal').classList.add('hidden');
        }

        function executeFromModal() {
            closePlanModal();
            showToast('Trade executed');
        }

        function generateGodSignals() {
            const amount = parseFloat(document.getElementById('godAmountInput').value) || 1000;
            const container = document.getElementById('godResults');
            container.innerHTML = `<div class="text-center py-6 text-xs text-yellow-400">Generating best setups for \]{amount}...</div>`;
            setTimeout(() => {
                const top = state.signals.slice(0,3);
                let html = '';
                top.forEach(sig => {
                    const alloc = Math.round(amount / 3);
                    html += `
                    <div class="bg-zinc-900 border border-yellow-400/30 rounded-3xl p-5 text-xs">
                        <div class="flex justify-between mb-3">
                            <div class="flex items-center gap-3"><span class="text-3xl">\( {sig.emoji}</span><div> \){sig.coin} ${sig.direction}</div></div>
                            <div class="font-mono">\[ {alloc}</div>
                        </div>
                        <button onclick="copyGod('${sig.coin}', ${alloc})" class="w-full py-3 bg-yellow-400 text-black font-medium rounded-2xl text-xs">COPY FOR BINANCE</button>
                    </div>`;
                });
                container.innerHTML = html;
            }, 800);
        }

        function copyGod(coin, alloc) {
            const text = `Coin: ${coin}\nSize: \]{alloc}\nLeverage: ${CONFIG.leverage}x`;
            navigator.clipboard.writeText(text);
            showToast('Copied');
        }

        function createAmountButtons() {
            const vals = [5,10,15,20,25,50,100];
            const container = document.getElementById('amountButtons');
            container.innerHTML = '';
            vals.forEach(v => {
                const btn = document.createElement('button');
                btn.className = `px-4 py-2 text-xs rounded-2xl ${v === 10 ? 'bg-yellow-400 text-black' : 'bg-white/10'}`;
                btn.textContent = `$${v}`;
                btn.onclick = () => { CONFIG.amount = v; generateSignals(); };
                container.appendChild(btn);
            });
        }

        function createLeverageButtons() {
            const vals = ['Auto(5x)','1x','2x','3x','5x','10x'];
            const container = document.getElementById('leverageButtons');
            container.innerHTML = '';
            vals.forEach((v,i) => {
                const btn = document.createElement('button');
                btn.className = `px-4 py-2 text-xs rounded-2xl ${i===0 ? 'bg-blue-500 text-white' : 'bg-white/10'}`;
                btn.textContent = v;
                btn.onclick = () => { CONFIG.leverage = parseInt(v) || 5; generateSignals(); };
                container.appendChild(btn);
            });
        }

        function editBalance() {
            const newBalance = prompt("Enter new balance ($)", "100");
            if (newBalance !== null) {
                document.getElementById('balanceDisplay').textContent = parseFloat(newBalance).toFixed(0);
            }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2500);
        }

        function switchTab(n) {
            document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
            document.getElementById('section' + n).classList.remove('hidden');
            document.querySelectorAll('.tab-button').forEach(t => t.classList.remove('active'));
            document.getElementById('tab' + n).classList.add('active');
        }

        window.onload = () => {
            createStarfield();
            setTimeout(() => {
                document.getElementById('loading').style.opacity = 0;
                setTimeout(() => {
                    document.getElementById('loading').remove();
                    document.getElementById('app').classList.remove('hidden');
                    connectRealWebSocket();
                    generateSignals();
                    createAmountButtons();
                    createLeverageButtons();
                    startLiveTime();
                    setInterval(generateSignals, 60000);
                }, 600);
            }, 1800);
        };
    </script>
</body>
</html>
