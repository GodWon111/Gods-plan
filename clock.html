<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>
    <style>
        body {
            background-color: #121212;
            color: #FFFFFF;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 100vh;
            margin: 0;
        }
        .clock {
            font-size: 48px;
            margin-bottom: 20px;
        }
        .timezone {
            font-size: 24px;
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="clock">Current Time:</div>
    <div class="timezone" id="utc"></div>
    <div class="timezone" id="est"></div>
    <div class="timezone" id="pst"></div>
    <div class="timezone" id="gmt"></div>
    <div class="timezone" id="ist"></div>
    <div class="timezone" id="jst"></div>
    <div class="timezone" id="aest"></div>

    <script>
        function updateTime() {
            const options = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            document.getElementById('utc').textContent = 'UTC: ' + new Date().toUTCString().split(' ')[4];
            document.getElementById('est').textContent = 'EST: ' + new Date(new Date().toLocaleString('en-US', { timeZone: 'America/New_York' })).toLocaleTimeString('en-US', options);
            document.getElementById('pst').textContent = 'PST: ' + new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Los_Angeles' })).toLocaleTimeString('en-US', options);
            document.getElementById('gmt').textContent = 'GMT: ' + new Date(new Date().toLocaleString('en-US', { timeZone: 'Europe/London' })).toLocaleTimeString('en-US', options);
            document.getElementById('ist').textContent = 'IST: ' + new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Kolkata' })).toLocaleTimeString('en-US', options);
            document.getElementById('jst').textContent = 'JST: ' + new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Tokyo' })).toLocaleTimeString('en-US', options);
            document.getElementById('aest').textContent = 'AEST: ' + new Date(new Date().toLocaleString('en-US', { timeZone: 'Australia/Sydney' })).toLocaleTimeString('en-US', options);
        }

        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
